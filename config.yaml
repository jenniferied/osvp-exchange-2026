# Submission formats. Every category now produces a proceedings entry (DOI),
# following the SIGGRAPH model where talks also have a short paper.
cfp:
  intro: >
    We invite submissions in English. Every accepted contribution is peer-reviewed and
    published with an individual DOI — full and short papers, plus short proceedings
    entries for talks and workshops. We are applying for the proceedings to appear in the
    ACM Digital Library (ICPS); until ACM confirms the venue, the ACM/ICPS steps below are
    our planned route and not yet final.*
  formats:
    - id: "full-paper"
      title: "Full Papers"
      desc: "Up to 8 pages (excl. references). Original research. Proceedings."
      image: "assets/cat-led-volume.jpg"
      about: >
        Full papers present original, completed research: a method, a system, a study
        or an evaluation, with enough detail to be reproduced and built on. This is the
        research core of the proceedings.
      requirements:
        - "Up to 8 pages excluding references, in the acmart sigconf format."
        - "Original work, not under review elsewhere."
        - "Anonymized for double-blind review (no names/affiliations, third-person self-citation, no grant numbers)."
        - "All authors listed with ORCID for the final metadata."
      acm: >
        Full papers are published in the ACM Digital Library through ICPS and uploaded
        via ACM TAPS, which produces the DOI, ORCID links and metadata. ACM supports
        double-blind review and provides the anonymization rules linked below.
    - id: "short-paper"
      title: "Short Papers"
      desc: "Up to 4 pages (excl. references). Work in progress, case studies, showcases. Proceedings."
      image: "assets/cat-pipelines.jpg"
      about: >
        Short papers are for work in progress, focused case studies, tool reports or a
        showcase written up as a paper. Less mature than a full paper, but a real,
        citable contribution with its own DOI.
      requirements:
        - "Up to 4 pages excluding references, in the acmart sigconf format."
        - "Anonymized for double-blind review."
        - "All authors listed with ORCID."
      acm: >
        Same ICPS / TAPS pipeline as full papers, with the same acmart template. A
        showcase or LED setup that you would otherwise only demo can be documented here
        to earn a DOI.
    - id: "talk"
      title: "Talks"
      desc: "20-minute presentation with a 2–4 page paper in the proceedings. Proceedings."
      image: "assets/cat-environments.jpg"
      about: >
        A 20-minute presentation backed by a 2–4 page paper, modelled on SIGGRAPH Talks.
        Ideal for practitioners and for sharing a production result, pipeline or lesson
        learned without writing an 8-page full paper. Open to contributors without an
        academic degree. If the work behind the talk is substantial, you may instead
        submit a full paper (up to 8 pages) and still present it as a talk — the talk is
        the presentation slot, and the written companion can be anything from a 2-page
        write-up to a full paper.
      requirements:
        - "A 2–4 page paper for the proceedings (a full paper of up to 8 pages is also allowed if the work warrants it)."
        - "A 20-minute talk; the written paper is what enters the proceedings."
        - "ORCID for each author; no academic degree required."
      acm: >
        The established model is the SIGGRAPH Talk: a short paper published alongside the
        presentation, with its own DOI. We follow that model. A talk can also be backed by
        a full paper — the presentation and the proceedings entry are scheduled separately.
        Showcases that name a specific stage are reviewed single-blind.
    - id: "workshop"
      title: "Workshops"
      desc: "Hands-on session at the LED wall (60–90 min) with a short proceedings write-up. Proceedings."
      image: "assets/cat-tracking.jpg"
      about: >
        A 60–90 minute hands-on session at the LED wall — a tutorial, a tool walkthrough
        or a guided exercise — accompanied by a short proceedings write-up so the
        material stays citable after the event.
      requirements:
        - "A workshop proposal (goals, audience, what happens at the LED wall, duration)."
        - "A short write-up (a few pages) in the acmart sigconf format for the proceedings."
        - "ORCID for each organizer."
      acm: >
        The write-up follows the same acmart / ICPS / TAPS pipeline and receives a DOI.
        Proposals are curated by the program committee rather than double-blind reviewed.
  template: >
    All submissions use the OSVP EXCHANGE template (download below), a single-column,
    two-column-compatible layout that matches the ACM acmart 'sigconf' proceedings format
    so that, if the venue is confirmed for ICPS, the accepted version converts to the ACM
    Digital Library through ACM TAPS without reformatting. LaTeX and Word are provided.*
  language: "English"
  review: >
    Papers receive at least two documented, double-blind reviews. Anonymize submissions
    by removing author names and affiliations, using third-person self-citation and no
    grant numbers. Practice showcases
    that name a specific stage are reviewed single-blind where anonymization is not
    feasible.
  provisional_note: >
    * The proceedings are planned for the ACM Digital Library via the ACM International
    Conference Proceedings Series (ICPS). That application is in progress; until ACM
    approves the venue we cannot use the ACM name, the ICPS name or the ACM logo as a
    confirmed fact, so anything marked * is our intended route. If ICPS is not confirmed,
    accepted and peer-reviewed papers will appear in our own citable online proceedings
    with DOIs (e.g. via Zenodo). Either way the work is peer-reviewed and gets a DOI.

# Important Dates — worked BACKWARD from the (earliest provisional) symposium date,
# 5 Dec 2026, which gives the tightest/most conservative ACM ceilings. Each row shows
# the EARLIEST a step can realistically happen and the LAST day it can happen before the
# next step breaks. "hard: true" = pinned to an ACM rule (rendered with "!"). "confirm:
# true" = the exact ACM offset still needs confirming against the live agreement.
dates_intro: >
  Everything below is worked backward from the provisional symposium date and shown as a
  range: the earliest a step can realistically happen, and the last day it can happen
  before the next step breaks. The binding constraint is the ICPS publication
  application. ACM needs it at least 60 days before the submission deadline and takes
  4–6 weeks to decide, with no expedited review. The application can go out any time from
  now until about 10 July 2026 — but the longer we wait, the shorter the paper-review
  window becomes (apply at the last moment and review shrinks to ~2 weeks; apply by late
  June and a fuller ~4-week review stays possible).
dates:
  - milestone: "ICPS publication application → ACM"
    earliest: "now"
    latest: "10 Jul 2026"
    depends: "Must reach ACM ≥60 days before the submission deadline. ACM takes 4–6 weeks to decide (no expedite). This last-possible day still allows a 9 Sep submission."
    hard: true
  - milestone: "Call for Papers released"
    earliest: "now"
    latest: "12 Aug 2026"
    depends: "Can open immediately, without ACM/ICPS branding, while the application is pending. Needs ≥4 weeks of author writing time before the submission deadline."
  - milestone: "Submission deadline"
    earliest: "26 Aug 2026"
    latest: "9 Sep 2026"
    depends: "Earliest gives authors ~4 weeks after the CfP. Latest leaves only a ~2-week review; for a fuller ~4-week review, close submissions around 26 Aug."
  - milestone: "Notification of acceptance"
    earliest: "9 Sep 2026"
    latest: "23 Sep 2026"
    depends: "After peer review. Must land before the metadata deadline so the records can be entered in time."
  - milestone: "Metadata upload → ACM"
    earliest: "after notification"
    latest: "26 Sep 2026"
    depends: "ACM requires metadata ≥70 days before the event (bibliographic record only; the corrected PDF can follow)."
    hard: true
  - milestone: "Camera-ready (final PDF via TAPS)"
    earliest: "after notification"
    latest: "21 Oct 2026"
    depends: "After acceptance; before the APC deadline and with production time before the event."
  - milestone: "APC payment (open-access charge)"
    earliest: "after metadata"
    latest: "21 Oct 2026"
    depends: "ACM: due 45 days before the event for simultaneous publication, and may be pulled forward to the 70-day metadata deadline. Unpaid papers are dropped from the proceedings."
    hard: true
    confirm: true
  - milestone: "Symposium"
    earliest: "5 Dec 2026"
    latest: "13 Dec 2026"
    depends: "Provisional. A LATER date (7–13 Dec) pushes the ACM 70-day and 45-day ceilings later too and relieves the whole upstream schedule."

# Small note under the table: the symposium date is not final yet.
date_alternatives: >
  Symposium date is provisional (5–6 December 2026). Any date in 7–13 December 2026 is
  still under consideration, and a later date would relax the deadlines above.

# Footnote shown under the deadlines table (explains the "!" hard ACM deadlines).
dates_note: >
  ! Pinned to an ACM rule — these move only if the conference date moves. The application
  to publish in ICPS must reach ACM at least 60 days before the submission deadline
  (verified); article metadata for accepted papers must be uploaded no later than 70 days
  before the event (verified); applicable open-access charges (APCs) are due 45 days
  before the event for simultaneous publication and may be required as early as the
  70-day metadata deadline (offset to confirm against the current ICPS agreement). Metadata
  is the bibliographic record, entered after notification; the final corrected PDF
  (camera-ready, via ACM TAPS) can follow later. All ACM/ICPS steps are conditional on
  ACM approving the venue (see the note marked * in the Call section).

related_dates: []

