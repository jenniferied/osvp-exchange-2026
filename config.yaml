# build.py renders template.html + this file -> index.html
# Edit values here, then run: python3 build.py
# Placeholders to fill are marked "TBD".

event:
  brand: "OSVP EXCHANGE"       # working title — rename freely
  year: 2026
  edition: "Inaugural Edition"
  subtitle: "Asia ⇄ Europe Exchange on On-Set Virtual Production & ICVFX"
  tagline: >
    Where Asia's momentum in technology meets Europe's heritage in production and
    research. An inaugural meeting at the LED wall, on-set Virtual Production across
    two continents.
  date: "5–6 December 2026"
  location: "Singapore"
  adjacency: ""   # hero hint removed
  proceedings: "We plan to publish every accepted contribution — paper, talk and workshop — with its own DOI. Publication in the ACM Digital Library (ICPS) is planned and subject to ACM approving the venue.*"

# Banner pinned to the very top of every page. Set to "" to remove before going public.
internal_preview: "Internal preview of the website — not public yet. Dates, committee and ACM/ICPS details are provisional and still being finalised."

scope: >
  OSVP EXCHANGE brings together researchers, educators and practitioners working with LED
  volumes and real-time production pipelines, across an Asia–Europe axis. Building on
  the link between NTU Singapore (Cinematic Arts / XR Studio / CAVR), TH OWL (Virtual
  Film Playground), Film University Babelsberg (ProSys / On-Set Virtual Production) and
  HSHL (LED stage / VFX lab), the symposium pairs Europe's strength in educational and
  VP research with the technological and production momentum of the Asia-Pacific region.
  We invite contributions on production support systems, LED volume and display
  technology, real-time worldbuilding, tracking and stage elements, and access to
  Virtual Production in education.

