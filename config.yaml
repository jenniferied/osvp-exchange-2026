    - { start: "2026-08-26", end: "2026-09-09", label: "Submission window — close anywhere here (later = shorter review)", kind: ours }
    - { date: "2026-09-23", label: "Notification of acceptance", kind: ours }
    - { date: "2026-09-26", label: "Metadata upload to ACM !", kind: icps }
    - { date: "2026-10-21", label: "Camera-ready + APC due !", kind: icps }
    - { start: "2026-12-05", end: "2026-12-06", label: "OSVP EXCHANGE symposium (provisional)", kind: ours }
    - { start: "2026-12-07", end: "2026-12-13", label: "Alternative date (provisional)", kind: alt }

