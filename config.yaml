# Author's Guide / How-To — links to everything an author needs, with downloads.
# Template links verified against ACM/CTAN; acmart current version v2.18 (2026/05/31).
resources:
  - title: "acmart template — current package (download)"
    desc: "Latest acmart v2.18 (2026) fetched fresh from CTAN. LaTeX class, ACM reference format, sigconf samples."
    href: "downloads/acmart-template.zip"
    download: true
  - title: "ACM Primary Article Template (official page)"
    desc: "ACM's authoritative template page — LaTeX, Word (acm_submission_template.docx) and instructions."
    href: "https://www.acm.org/publications/proceedings-template"
  - title: "acmart on Overleaf — sigconf"
    desc: "Open the official proceedings template directly in Overleaf, no install."
    href: "https://www.overleaf.com/latex/templates/association-for-computing-machinery-acm-sig-proceedings-template/bmvfhcdnxfty"
  - title: "acmart source (GitHub / CTAN)"
    desc: "The maintained source, for the always-current version."
    href: "https://github.com/borisveytsman/acmart"
  - title: "ACM ICPS author guidance"
    desc: "Open access, APC rules, what ICPS authors need to know."
    href: "https://www.acm.org/publications/icps/author-guidance"
  - title: "ACM double-blind & anonymization policy"
    desc: "How to anonymize a submission correctly for double-blind review."
    href: "https://www.acm.org/publications/policies/anonymization-policy"
  - title: "Register / find your ORCID"
    desc: "Every author needs an ORCID for clean metadata in the ACM DL."
    href: "https://orcid.org/register"

